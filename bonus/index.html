<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>המדריך למקסום הטבות מס</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            overflow: hidden;
            display: flex;
            font-family: "Segoe UI", "Arial", sans-serif;
        }

        /* Right Sidebar */
        .sidebar {
            width: 300px;
            background: #0a0a0a;
            color: #f0f0f0;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 24px 20px;
            font-size: 18px;
            font-weight: 700;
            line-height: 1.4;
            border-bottom: 1px solid #222;
        }

        .menu {
            list-style: none;
            padding: 12px 0;
            overflow-y: auto;
            flex: 1;
        }

        .menu li a {
            display: block;
            padding: 14px 20px;
            color: #bbb;
            text-decoration: none;
            font-size: 15px;
            border-right: 3px solid transparent;
            transition: background 0.15s, color 0.15s;
        }

        .menu li a:hover {
            background: #161616;
            color: #fff;
        }

        .menu li a.active {
            background: #1c1c1c;
            color: #fff;
            border-right: 3px solid #e6b800;
            font-weight: 600;
        }

        /* Main Area */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .topbar {
            height: 50px;
            background: #0a0a0a;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            flex-shrink: 0;
        }

        .topbar .guide-title {
            font-size: 16px;
            font-weight: 600;
        }

        .topbar .exit-link {
            color: #e6b800;
            text-decoration: none;
            font-size: 14px;
        }

        .topbar .exit-link:hover {
            text-decoration: underline;
        }

        /* PDF Container */
        .pdf-container {
            flex: 1;
            width: 100%;
            background: #525659;
            overflow: hidden;
        }

        /* Responsive: stacked layout with sticky tabs and inline iframe */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                overflow: auto;
            }

            /* Sidebar/header sticks to the top so the PDF scrolls beneath it */
            .sidebar {
                width: 100%;
                height: auto;
                flex-shrink: 0;
                position: sticky;
                top: 0;
                z-index: 100;
                background: #0a0a0a;
            }

            .sidebar-header {
                padding: 14px 20px;
                font-size: 15px;
            }

            .menu {
                display: flex;
                flex-direction: row;
                justify-content: center;
                gap: 10px;
                padding: 10px;
                overflow: visible;
            }

            .menu li a {
                padding: 8px 12px;
                font-size: 13px;
                text-align: center;
                border-right: none;
                border-bottom: 3px solid transparent;
                border-radius: 6px;
                background: #161616;
            }

            .menu li a.active {
                border-right: none;
                border-bottom: 3px solid #e6b800;
            }

            .topbar {
                display: none;
            }

            /* Fill the viewport below the sticky header (~120px tall) */
            .pdf-container {
                height: calc(100vh - 120px);
            }

            .pdf-container iframe {
                height: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Right Sidebar -->
    <aside class="sidebar">
        <ul class="menu">
            <li><a href="#" class="active" data-pdf="special-bonus.pdf">מדריך מתנה (מיקסום הטבות מס)</a></li>
        </ul>
    </aside>

    <!-- Main Area -->
    <main class="main">
        <div class="topbar"></div>
        <div class="pdf-container">
            <iframe id="pdf-frame" src="special-bonus.pdf" style="width: 100%; height: 100%; border: none;"></iframe>
        </div>
    </main>

    <script>
        (function () {
            var frame = document.getElementById('pdf-frame');
            var links = document.querySelectorAll('.menu a[data-pdf]');

            function activate(link) {
                var pdfFileName = link.getAttribute('data-pdf');
                links.forEach(function (l) { l.classList.remove('active'); });
                link.classList.add('active');

                var isMobile = window.innerWidth <= 768;
                if (!isMobile) {
                    // Desktop: native PDF viewer, fit to container width.
                    frame.src = pdfFileName + '#view=FitH&navpanes=0';
                } else {
                    // Mobile: Google Docs Viewer workaround (mobile browsers
                    // don't render PDFs inline reliably).
                    var absoluteUrl = new URL(pdfFileName, window.location.origin + window.location.pathname).href;
                    frame.src = 'https://docs.google.com/gview?url=' + encodeURIComponent(absoluteUrl) + '&embedded=true';
                }
            }

            links.forEach(function (link) {
                link.addEventListener('click', function (e) {
                    e.preventDefault();
                    activate(link);
                });
            });

            // Ensure the first item is active and its PDF is loaded on page load.
            var initial = document.querySelector('.menu a.active') || links[0];
            if (initial) { activate(initial); }
        })();
    </script>
</body>
</html>
