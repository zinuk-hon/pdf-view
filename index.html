<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>האזור הרותח בישראל - מדריך להשקעה</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            overflow: hidden;
            display: flex;
            font-family: "Segoe UI", "Arial", sans-serif;
        }

        /* Right Sidebar */
        .sidebar {
            width: 300px;
            background: #0a0a0a;
            color: #f0f0f0;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 24px 20px;
            font-size: 18px;
            font-weight: 700;
            line-height: 1.4;
            border-bottom: 1px solid #222;
        }

        /* Progress Bar */
        .progress-section {
            padding: 18px 20px;
            border-bottom: 1px solid #222;
        }

        .progress-section .progress-label {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .progress-section .progress-title {
            font-size: 14px;
            font-weight: 600;
            color: #f0f0f0;
        }

        .progress-section .progress-count {
            font-size: 12px;
            color: #888;
        }

        .progress-track {
            height: 8px;
            background: #1c1c1c;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #c99a00, #e6b800);
            border-radius: 4px;
        }

        .menu {
            list-style: none;
            padding: 12px 0;
            overflow-y: auto;
            flex: 1;
        }

        .menu li a {
            display: block;
            padding: 14px 20px;
            color: #bbb;
            text-decoration: none;
            font-size: 15px;
            border-right: 3px solid transparent;
            transition: background 0.15s, color 0.15s;
        }

        .menu li a:hover {
            background: #161616;
            color: #fff;
        }

        .menu li a.active {
            background: #1c1c1c;
            color: #fff;
            border-right: 3px solid #e6b800;
            font-weight: 600;
        }

        /* Main Area */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .topbar {
            height: 50px;
            background: #0a0a0a;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            flex-shrink: 0;
        }

        .topbar .guide-title {
            font-size: 16px;
            font-weight: 600;
        }

        .topbar .exit-link {
            color: #e6b800;
            text-decoration: none;
            font-size: 14px;
        }

        .topbar .exit-link:hover {
            text-decoration: underline;
        }

        /* PDF Container */
        .pdf-container {
            flex: 1;
            width: 100%;
            background: #525659;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <!-- Right Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">האזור הרותח בישראל - מדריך להשקעה</div>
        <div class="progress-section">
            <div class="progress-label">
                <span class="progress-title">מד התקדמות</span>
                <span class="progress-count">100% (1/1)</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill"></div>
            </div>
        </div>
        <ul class="menu">
            <li><a href="#" class="active" data-pdf="investment-guide.pdf">מדריך להשקעה (PDF)</a></li>
            <li><a href="#" data-pdf="investment-guide-bonus.pdf">מדריך בונוס (מקסום הטבות מס)</a></li>
        </ul>
    </aside>

    <!-- Main Area -->
    <main class="main">
        <div class="topbar"></div>
        <div class="pdf-container">
            <iframe id="pdf-frame" src="investment-guide.pdf" style="width: 100%; height: 100%; border: none;"></iframe>
        </div>
    </main>

    <script>
        (function () {
            var frame = document.getElementById('pdf-frame');
            var links = document.querySelectorAll('.menu a[data-pdf]');

            function activate(link) {
                links.forEach(function (l) { l.classList.remove('active'); });
                link.classList.add('active');
                frame.src = link.getAttribute('data-pdf');
            }

            links.forEach(function (link) {
                link.addEventListener('click', function (e) {
                    e.preventDefault();
                    activate(link);
                });
            });

            // Ensure the first item is active and its PDF is loaded on page load.
            var initial = document.querySelector('.menu a.active') || links[0];
            if (initial) { activate(initial); }
        })();
    </script>
</body>
</html>
