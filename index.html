<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>האזור הרותח בישראל - מדריך להשקעה</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            overflow: hidden;
            display: flex;
            font-family: "Segoe UI", "Arial", sans-serif;
        }

        /* Right Sidebar */
        .sidebar {
            width: 300px;
            background: #0a0a0a;
            color: #f0f0f0;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 24px 20px;
            font-size: 18px;
            font-weight: 700;
            line-height: 1.4;
            border-bottom: 1px solid #222;
        }

        .menu {
            list-style: none;
            padding: 12px 0;
            overflow-y: auto;
            flex: 1;
        }

        .menu li a {
            display: block;
            padding: 14px 20px;
            color: #bbb;
            text-decoration: none;
            font-size: 15px;
            border-right: 3px solid transparent;
            transition: background 0.15s, color 0.15s;
        }

        .menu li a:hover {
            background: #161616;
            color: #fff;
        }

        .menu li a.active {
            background: #1c1c1c;
            color: #fff;
            border-right: 3px solid #e6b800;
            font-weight: 600;
        }

        /* Main Area */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .topbar {
            height: 50px;
            background: #0a0a0a;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            flex-shrink: 0;
        }

        .topbar .guide-title {
            font-size: 16px;
            font-weight: 600;
        }

        .topbar .exit-link {
            color: #e6b800;
            text-decoration: none;
            font-size: 14px;
        }

        .topbar .exit-link:hover {
            text-decoration: underline;
        }

        /* PDF Container */
        .pdf-container {
            flex: 1;
            width: 100%;
            background: #525659;
            overflow: hidden;
        }

        /* Mobile read-guide fallback button (hidden on desktop) */
        .mobile-fallback {
            display: none;
            flex: 1;
            width: 100%;
            background: #525659;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .read-btn {
            display: inline-block;
            padding: 16px 36px;
            background: linear-gradient(90deg, #c99a00, #e6b800);
            color: #0a0a0a;
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
            border-radius: 10px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .read-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 26px rgba(0, 0, 0, 0.45);
        }

        /* Responsive: stack layout, compact menu, swap iframe for button */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                overflow: auto;
            }

            .sidebar {
                width: 100%;
                height: auto;
                flex-shrink: 0;
            }

            .sidebar-header {
                padding: 16px 20px;
                font-size: 16px;
            }

            .menu {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                padding: 12px;
                overflow: visible;
            }

            .menu li {
                flex: 1 1 auto;
            }

            .menu li a {
                padding: 10px 14px;
                font-size: 14px;
                text-align: center;
                border-right: none;
                border-bottom: 3px solid transparent;
                border-radius: 6px;
                background: #161616;
            }

            .menu li a.active {
                border-right: none;
                border-bottom: 3px solid #e6b800;
            }

            .topbar {
                display: none;
            }

            .pdf-container {
                display: none;
            }

            .mobile-fallback {
                display: flex;
                min-height: 60vh;
            }
        }
    </style>
</head>
<body>
    <!-- Right Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">האזור הרותח בישראל - מדריך להשקעה</div>
        <ul class="menu">
            <li><a href="#" class="active" data-pdf="investment-guide.pdf">מדריך להשקעה (PDF)</a></li>
            <li><a href="#" data-pdf="investment-guide-bonus.pdf">מדריך בונוס (מקסום הטבות מס)</a></li>
        </ul>
    </aside>

    <!-- Main Area -->
    <main class="main">
        <div class="topbar"></div>
        <div class="pdf-container">
            <iframe id="pdf-frame" src="investment-guide.pdf" style="width: 100%; height: 100%; border: none;"></iframe>
        </div>
        <div class="mobile-fallback">
            <a id="read-btn" class="read-btn" href="investment-guide.pdf" target="_blank" rel="noopener">קרא את המדריך</a>
        </div>
    </main>

    <script>
        (function () {
            var frame = document.getElementById('pdf-frame');
            var readBtn = document.getElementById('read-btn');
            var links = document.querySelectorAll('.menu a[data-pdf]');

            function activate(link) {
                var pdf = link.getAttribute('data-pdf');
                links.forEach(function (l) { l.classList.remove('active'); });
                link.classList.add('active');
                frame.src = pdf;
                readBtn.href = pdf;
            }

            links.forEach(function (link) {
                link.addEventListener('click', function (e) {
                    e.preventDefault();
                    activate(link);
                });
            });

            // Ensure the first item is active and its PDF is loaded on page load.
            var initial = document.querySelector('.menu a.active') || links[0];
            if (initial) { activate(initial); }
        })();
    </script>
</body>
</html>
